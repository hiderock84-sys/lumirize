name: Simple site quality gate

on:
  push:
    paths:
      - "simple/**"
      - "tools/validate_simple_site.py"
      - ".github/workflows/simple-site-quality.yml"
  pull_request:
    paths:
      - "simple/**"
      - "tools/validate_simple_site.py"
      - ".github/workflows/simple-site-quality.yml"
  workflow_dispatch:

jobs:
  validate-simple-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Structural validation
        run: python tools/validate_simple_site.py

      - name: HTTP smoke test
        run: |
          python -m http.server 4173 --directory . >/tmp/simple-server.log 2>&1 &
          sleep 2
          for page in simple/*.html; do
            curl -fsS "http://127.0.0.1:4173/$page" >/dev/null
          done

      - name: Upload simple artifact
        uses: actions/upload-artifact@v4
        with:
          name: simple-site-html
          path: simple/
